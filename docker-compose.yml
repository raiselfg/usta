services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-usta}
    ports:
      - '5435:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/next-api/Dockerfile
    ports:
      - '8080:3000'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-usta}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-usta}?schema=public
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      AWS_ENDPOINT: ${AWS_ENDPOINT}
      AWS_REGION: ${AWS_REGION}
      AWS_BUCKET: ${AWS_BUCKET}
      AWS_ACCESS_KEY: ${AWS_ACCESS_KEY}
      AWS_SECRET_KEY: ${AWS_SECRET_KEY}
      REVALIDATION_TOKEN: ${REVALIDATION_TOKEN}
      # В docker-сети ревалидация landing идёт по имени сервиса, а не на прод
      NEXT_PUBLIC_URL: ${NEXT_PUBLIC_URL:-http://landing:3000}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'nc -z localhost 3000 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5

  landing:
    build:
      context: .
      dockerfile: apps/landing/Dockerfile
    ports:
      - '3000:3000'
    environment:
      # SSR-фетч идёт изнутри контейнера → адрес сервиса api, а не localhost хоста
      NEXT_PUBLIC_API_URL: http://api:3000
      REVALIDATION_TOKEN: ${REVALIDATION_TOKEN}
    depends_on:
      - api

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      # Vite-переменные нужны на сборке (SPA статичен), не в runtime
      args:
        VITE_BETTER_AUTH_BASE_URL: ${VITE_BETTER_AUTH_BASE_URL:-http://localhost:8080}
    ports:
      - '8081:3000'
    depends_on:
      - api

volumes:
  postgres_data:
